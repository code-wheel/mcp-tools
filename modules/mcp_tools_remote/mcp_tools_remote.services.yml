services:
  logger.channel.mcp_tools_remote:
    parent: logger.channel_base
    arguments: ['mcp_tools_remote']

  mcp_tools_remote.api_key_manager:
    class: Drupal\mcp_tools_remote\Service\ApiKeyManager
    arguments:
      - '@state'
      - '@private_key'
      - '@datetime.time'

  mcp_tools_remote.access_checker:
    class: Drupal\mcp_tools_remote\Access\McpRemoteAccessCheck
    arguments:
      - '@config.factory'
    tags:
      - { name: access_check, applies_to: _mcp_remote_access }
