# =============================================================================
# Security Scanning Workflow
# Runs gitleaks and other security checks on PRs and pushes
# =============================================================================

name: Security

on:
  push:
    branches: [master, main, 1.0.x]
  pull_request:
    branches: [master, main, 1.0.x]
  schedule:
    # Run weekly on Sundays at midnight
    - cron: '0 0 * * 0'

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The gitleaks-action wrapper requires a license key for org-owned
      # repos; the scanner itself is MIT-licensed. Run the binary directly.
      # Notes: gitleaks 8.28+ replaced `detect` with `dir`/`git`, and the
      # old `.gitleaks.toml` was never committed (it's a sync-stripped
      # internal file), so use the built-in ruleset. --exit-code 2 fails the
      # job only on a real finding.
      - name: Run Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --redact --exit-code 2 --verbose

  php-security:
    name: PHP Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Check for vulnerable dependencies
        run: |
          if [ -f "composer.lock" ]; then
            composer audit
          else
            echo "No composer.lock found, skipping audit"
          fi
